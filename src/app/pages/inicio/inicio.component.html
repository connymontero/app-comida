<div class="container mt-5">

  <!-- bienvenida -->
  <div class="row mb-4">

    <div class="col-12">

      <div class="welcome-box shadow-sm p-3 text-center">

        <h3 class="fw-bold mb-1">
          ¡Bienvenido a FoodApp!
        </h3>

        <p class="mb-0">
          Pide tu comida favorita de forma rápida y segura.
        </p>

      </div>

    </div>

    <div class="col-md-6">
      <div class="card shadow-lg border-0">
        <div class="card-body p-5">
          <h2 class="text-center mb-4">Ingreso Cliente</h2>
          
          <form (ngSubmit)="login()" #loginForm="ngForm">
            <div class="mb-3">
              <label class="form-label">Usuario</label>
              <input type="text" name="usuario" [(ngModel)]="usuario" class="form-control" placeholder="Ej: cliente" required>
            </div>

            <!-- Contraseña -->
            <div class="mb-4">
              <label class="form-label">Contraseña</label>
              <input type="password" name="clave" [(ngModel)]="clave" class="form-control" placeholder="****" required>
            </div>

            <!-- Botón -->
            <button
              type="submit"
              class="btn btn-success-custom w-100 btn-lg fw-bold"
              [disabled]="loginForm.invalid"
            >

              Entrar a Pedidos

            </button>

          </form>
          
          <div class="mt-3 text-center">
            <small class="text-muted">Tip: usa 'cliente' y '1234'</small>
          </div>
        </div>
      </div>

    </div>
    
    
  </div>

</div>
