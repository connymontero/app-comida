<div class="container mt-5">
  <div class="row align-items-center">
    
    <div class="col-md-6">
      <div class="p-5 mb-4 bg-warning rounded-3 shadow">
        <h1 class="display-5 fw-bold">¡Bienvenido a FoodApp!</h1>
        <p class="col-md-10 fs-4">Pide tu comida favorita de forma rápida y segura. Identifícate para comenzar tu pedido.</p>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card shadow-lg border-0">
        <div class="card-body p-5">
          <h2 class="text-center mb-4">Ingreso Cliente</h2>
          
          <form (ngSubmit)="login()" #loginForm="ngForm">
            <div class="mb-3">
              <label class="form-label">Usuario</label>
              <input type="text" name="usuario" [(ngModel)]="usuario" class="form-control" placeholder="Ej: cliente" required>
            </div>
            
            <div class="mb-4">
              <label class="form-label">Contraseña</label>
              <input type="password" name="clave" [(ngModel)]="clave" class="form-control" placeholder="****" required>
            </div>
            
            <button type="submit" class="btn btn-dark w-100 btn-lg text-warning" [disabled]="loginForm.invalid">
              Entrar a Pedidos
            </button>
          </form>
          
          <div class="mt-3 text-center">
            <small class="text-muted">Tip: usa 'cliente' y '1234'</small>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
