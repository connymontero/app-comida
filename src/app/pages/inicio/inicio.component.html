<!-- que hace este html : > el usuario escrive > ngModel actualiza variables > 
valida > LoginForm cambia el estado > Boton habilita > submit elecuta login() -->

<div class="container mt-5">
  <div class="row align-items-center">

    <div class="col-md-6">
      <div class="p-5 mb-4 bg-warning rounded-3 shadow">
        <h1 class="display-5 fw-bold">¡Bienvenido a FoodApp!</h1>
        <p class="col-md-10 fs-4">Pide tu comida favorita de forma rápida y segura. Identifícate para comenzar tu
          pedido.</p>
      </div>

    </div>

    <div class="col-md-6">
      <div class="card shadow-lg border-0">
        <div class="card-body p-5">
          <h2 class="text-center mb-4">Ingreso Cliente</h2>

          <form (ngSubmit)="login()" #loginForm="ngForm" (input)="onFormChange()">
            <div class="mb-3">
              <label class="form-label">Usuario</label>
              <input type="text" name="usuario" [(ngModel)]="usuario" class="form-control" placeholder="Ej: cliente"
                required #nameVar="ngModel">
              <!-- <br *ngIf="!usuario || nameVar.valid" /> -->
              <!-- <small *ngIf="nameVar.invalid && nameVar.touched" class="text-danger">El usuario es obligatorio</small> -->
              <small class="text-danger"
                [style.visibility]="(nameVar.invalid && nameVar.touched) ? 'visible' : 'hidden'">
                El usuario es obligatorio
              </small>
            </div>

            <div class="mb-4">
              <label class="form-label">Contraseña</label>
              <input type="password" name="clave" [(ngModel)]="clave" class="form-control" placeholder="****" required
                #passVar="ngModel">
              <small class="text-danger"
                [style.visibility]="(passVar.invalid && passVar.touched) ? 'visible' : 'hidden'">
                La contraseña es obligatoria
              </small>
            </div>

            <button type="submit" class="btn btn-dark w-100 btn-lg text-warning" [disabled]="loginForm.invalid">
              Entrar a Pedidos


            </button>


          </form>

          <div class="mt-3 text-center">
            <small class="text-muted">Tip: usa 'cliente' y '1234'</small>
            <br />
            <br *ngIf="validado" />
            <small *ngIf="!validado" class="text-danger">Usuario y/o contraseña incorrectos</small>
          </div>

        </div>

        <!-- Botones -->
        <button class="carousel-control-prev"
                type="button"
                data-bs-target="#carouselExampleCaptions"
                data-bs-slide="prev">

          <span class="carousel-control-prev-icon"></span>

        </button>

        <button class="carousel-control-next"
                type="button"
                data-bs-target="#carouselExampleCaptions"
                data-bs-slide="next">

          <span class="carousel-control-next-icon"></span>

        </button>

      </div>

    </div>
    
  </div>


</div>
