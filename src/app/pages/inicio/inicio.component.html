<!-- que hace este html : > el usuario escrive > ngModel actualiza variables > 
valida > LoginForm cambia el estado > Boton habilita > submit elecuta login() -->

<div class="container mt-5">

  <div class="row align-items-center">

    <!-- Columna izquierda -->
    <div class="col-md-6">

      <!-- Bienvenida -->
      <div class="p-5 mb-4 bg-warning rounded-3 shadow">
        <h1 class="display-5 fw-bold">¡Bienvenido a FoodApp!</h1>

        <p class="col-md-10 fs-4">
          Pide tu comida favorita de forma rápida y segura.
          Identifícate para comenzar tu pedido.
        </p>
      </div>

      <!-- Carrusel -->
      <div id="carouselExampleCaptions"
          class="carousel slide shadow mb-5"
          data-bs-ride="carousel">

        <!-- Indicadores -->
        <div class="carousel-indicators">
          <button type="button"
                  data-bs-target="#carouselExampleCaptions"
                  data-bs-slide-to="0"
                  class="active">
          </button>

          <button type="button"
                  data-bs-target="#carouselExampleCaptions"
                  data-bs-slide-to="1">
          </button>
        </div>

        <!-- Slides -->
        <div class="carousel-inner rounded-bottom">

          <!-- Slide 1 -->
          <div class="carousel-item active">

            <img
              src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1000"
              class="d-block w-100"
              alt="Comida 1"
              style="height: 400px; object-fit: cover;"
            >

            <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded">
              <h5>Los mejores ingredientes</h5>
              <p>Calidad premium en cada bocado.</p>
            </div>

          </div>

          <!-- Slide 2 -->
          <div class="carousel-item">

            <img
              src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=1000"
              class="d-block w-100"
              alt="Comida 2"
              style="height: 400px; object-fit: cover;"
            >

            <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded">
              <h5>Sabor Inigualable</h5>
              <p>Recetas tradicionales con un toque moderno.</p>
            </div>

          </div>

        </div>

        <!-- Botón anterior -->
        <button class="carousel-control-prev"
                type="button"
                data-bs-target="#carouselExampleCaptions"
                data-bs-slide="prev">

          <span class="carousel-control-prev-icon"></span>

        </button>

        <!-- Botón siguiente -->
        <button class="carousel-control-next"
                type="button"
                data-bs-target="#carouselExampleCaptions"
                data-bs-slide="next">

          <span class="carousel-control-next-icon"></span>

        </button>

      </div>


    </div>

    <!-- Columna derecha -->
    <div class="col-md-6">

      <div class="card shadow-lg border-0">

        <div class="card-body p-5">

          <h2 class="text-center mb-4">
            Ingreso Cliente
          </h2>

          <!-- Formulario Angular -->
          <form (ngSubmit)="login()" #loginForm="ngForm">

            <!-- Usuario -->
            <div class="mb-3">

              <label class="form-label">
                Usuario
              </label>

              <input
                type="text"
                name="usuario"
                [(ngModel)]="usuario"
                class="form-control"
                placeholder="Ej: cliente"
                required
              >

            </div>

            <!-- Contraseña -->
            <div class="mb-4">

              <label class="form-label">
                Contraseña
              </label>

              <input
                type="password"
                name="clave"
                [(ngModel)]="clave"
                class="form-control"
                placeholder="****"
                required
              >

            </div>

            <!-- Botón -->
            <button
              type="submit"
              class="btn btn-dark w-100 btn-lg text-warning"
              [disabled]="loginForm.invalid"
            >

              Entrar a Pedidos

            </button>

          </form>

        </div>

      </div>


    </div>
    
  </div>

</div>
